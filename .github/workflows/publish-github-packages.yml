# Publishes vibescan to GitHub Packages (npm registry).
# Prereq: the package scope (@jobersteadt) must be allowed for the auth token — usually the
# GitHub user or org that owns the token must match that scope, or set GH_PACKAGES_TOKEN
# to a PAT from the GitHub account that owns @jobersteadt on npm.

name: Publish GitHub Package

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-github-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: "@jobersteadt"

      - run: npm ci

      - name: Publish @jobersteadt/vibescan to GitHub Packages
        working-directory: vibescan
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm publish
