name: VibeScan pack smoke

# Proves the published npm tarball shape: pack vibescan, install the .tgz in a clean folder, run the CLI.

on:
  push:
    paths:
      - "vibescan/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vibescan-pack-smoke.yml"
  pull_request:
    paths:
      - "vibescan/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vibescan-pack-smoke.yml"

jobs:
  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build workspace and create tarball
        run: |
          npm ci
          npm run build -w vibescan
          npm pack -w vibescan --pack-destination "$RUNNER_TEMP"

      - name: Install tarball and smoke-test CLI
        run: |
          set -euo pipefail
          TARBALL=$(ls "$RUNNER_TEMP"/vibescan-*.tgz | head -1)
          mkdir -p "$RUNNER_TEMP/pack-smoke-project"
          cd "$RUNNER_TEMP/pack-smoke-project"
          npm init -y
          npm install "$TARBALL"
          npx vibescan --help
          npx vibescan scan "$GITHUB_WORKSPACE/vibescan/tests/fixtures/crypto-safe" --format sarif > out.sarif
          test -s out.sarif
