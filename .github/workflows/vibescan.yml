name: VibeScan

on:
  push:
    paths:
      - ".github/workflows/vibescan.yml"
      - "package.json"
      - "package-lock.json"
      - "vibescan/**"
  pull_request:
    paths:
      - ".github/workflows/vibescan.yml"
      - "package.json"
      - "package-lock.json"
      - "vibescan/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vibescan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vibescan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run VibeScan tests
        run: npm test -w @jobersteadt/vibescan

      - name: Verify fixture scan output formats
        run: npm run ci:verify-fixture-formats -w @jobersteadt/vibescan
