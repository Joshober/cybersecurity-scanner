name: VibeScan

on:
  push:
    paths:
      - "vibescan/**"
      - "benchmarks/seeded/**"
      - ".github/workflows/vibescan.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "vibescan/**"
      - "benchmarks/seeded/**"
      - ".github/workflows/vibescan.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  vibescan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: npm audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - run: npm test -w vibescan

      - run: node ./vibescan/dist/system/cli/index.js scan ./vibescan/tests/fixtures/crypto-safe --format json > ./vibescan-fixture.out.json
      - run: node ./vibescan/dist/system/cli/index.js scan ./vibescan/tests/fixtures/crypto-safe --format sarif > ./vibescan-fixture.out.sarif
      - run: test -s ./vibescan-fixture.out.json
      - run: test -s ./vibescan-fixture.out.sarif

      - name: SLOP-001 registry smoke (seeded package.json)
        run: node ./vibescan/dist/system/cli/index.js scan ./benchmarks/seeded/slop-case --check-registry --format json | node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));const f=(d.findings||[]).filter(x=>x.ruleId==='SLOP-001');if(f.length<1){console.error('Expected at least one SLOP-001 finding');process.exit(1)}console.log('SLOP-001 count:',f.length)"
        continue-on-error: true
