name: VibeScan

on:
  push:
    paths:
      - "vibescan/**"
  pull_request:
    paths:
      - "vibescan/**"

jobs:
  vibescan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vibescan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vibescan/package-lock.json
      - run: npm ci
      - run: npm test
      - run: node src/cli.js scan ./tests/fixtures/vulnerable-express-app --json
      - run: node src/cli.js rules
