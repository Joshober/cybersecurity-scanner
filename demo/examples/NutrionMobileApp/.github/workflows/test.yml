name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nutrition_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Run backend unit tests
      run: |
        cd backend
        mvn test -Dspring.profiles.active=test
    
    - name: Run backend integration tests
      run: |
        cd backend
        mvn verify -Dspring.profiles.active=test
    
    - name: Generate test report
      run: |
        cd backend
        mvn surefire-report:report
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: backend-test-results
        path: backend/target/site/surefire-report.html

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Cache Flutter dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.pub-cache
          frontend/.dart_tool
        key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-
    
    - name: Get Flutter dependencies
      run: |
        cd frontend
        flutter pub get
    
    - name: Generate mock files
      run: |
        cd frontend
        flutter packages pub run build_runner build --delete-conflicting-outputs
    
    - name: Run Flutter tests
      run: |
        cd frontend
        flutter test --coverage
    
    - name: Run Flutter analyze
      run: |
        cd frontend
        flutter analyze
    
    - name: Upload coverage results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: frontend-coverage
        path: frontend/coverage/lcov.info

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Cache Flutter dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.pub-cache
          frontend/.dart_tool
        key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-
    
    - name: Build and start services
      run: |
        docker-compose -f docker-compose.test.yml up -d --build
        sleep 60
    
    - name: Wait for services to be ready
      run: |
        timeout 300 bash -c 'until curl -f http://localhost:8081/api/actuator/health; do sleep 5; done'
        timeout 300 bash -c 'until curl -f http://localhost:3001; do sleep 5; done'
    
    - name: Run integration tests
      run: |
        cd backend
        mvn test -Dtest="*E2ETest" -Dspring.profiles.active=test
    
    - name: Test API endpoints
      run: |
        # Test menu endpoint
        curl -f "http://localhost:8081/api/menu/items?location=48760001&date=2024-01-15&mealType=lunch" || echo "Menu API test failed"
        
        # Test auth endpoint
        curl -f -X POST http://localhost:8081/api/auth/login -H "Content-Type: application/json" -d '{"username":"test","password":"test"}' || echo "Auth API test failed"
    
    - name: Clean up
      if: always()
      run: |
        docker-compose -f docker-compose.test.yml down

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Run OWASP dependency check
      run: |
        cd backend
        mvn org.owasp:dependency-check-maven:check
    
    - name: Upload security report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-report
        path: backend/target/dependency-check-report.html

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-tests, security-tests]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Generate test summary
      run: |
        echo "# Test Summary" > test-summary.md
        echo "" >> test-summary.md
        echo "## Backend Tests" >> test-summary.md
        echo "- Status: $([ "${{ needs.backend-tests.result }}" == "success" ] && echo "✅ PASSED" || echo "❌ FAILED")" >> test-summary.md
        echo "" >> test-summary.md
        echo "## Frontend Tests" >> test-summary.md
        echo "- Status: $([ "${{ needs.frontend-tests.result }}" == "success" ] && echo "✅ PASSED" || echo "❌ FAILED")" >> test-summary.md
        echo "" >> test-summary.md
        echo "## Integration Tests" >> test-summary.md
        echo "- Status: $([ "${{ needs.integration-tests.result }}" == "success" ] && echo "✅ PASSED" || echo "❌ FAILED")" >> test-summary.md
        echo "" >> test-summary.md
        echo "## Security Tests" >> test-summary.md
        echo "- Status: $([ "${{ needs.security-tests.result }}" == "success" ] && echo "✅ PASSED" || echo "❌ FAILED")" >> test-summary.md
    
    - name: Upload test summary
      uses: actions/upload-artifact@v3
      with:
        name: test-summary
        path: test-summary.md
