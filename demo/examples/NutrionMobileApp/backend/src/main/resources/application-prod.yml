spring:
  application:
    name: nutrition-app-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/nutrition_db}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:nutrition_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:30}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Use 'none' to prevent Hibernate from validating schema
      # Flyway handles all schema changes via migrations
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        jdbc.batch_versioned_data: true
  
  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  
  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 minutes
  
  # H2 Console - DISABLED in production
  h2:
    console:
      enabled: false
  
  # Flyway Configuration
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  
  # Security - No default credentials in production
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:}
      password: ${SPRING_SECURITY_USER_PASSWORD:}

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
  http2:
    enabled: true

# Auth0 Configuration (Recommended for production)
auth0:
  domain: ${AUTH0_DOMAIN:}
  client-id: ${AUTH0_CLIENT_ID:}
  client-secret: ${AUTH0_CLIENT_SECRET:}
  audience: ${AUTH0_AUDIENCE:}
  issuer: ${AUTH0_ISSUER:${auth0.domain}}
  enabled: ${AUTH0_ENABLED:true}

# JWT Configuration (fallback if Auth0 not enabled)
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds

# CORS Configuration - RESTRICTED in production
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "Authorization,Content-Type,X-Requested-With"
  allow-credentials: true
  max-age: 3600

# ML/AI Configuration
ml:
  mode: ${ML_MODE:openrouter-only}
  onnx:
    models-path: ${ML_MODELS_PATH:/app/models/}
    food-classification-model: ${ONNX_MODEL_NAME:food_classifier.onnx}
    auto-download: ${ML_AUTO_DOWNLOAD:false}
    model-download-url: ${ML_MODEL_DOWNLOAD_URL:}
  inference:
    batch-size: 1
    timeout: 30000 # 30 seconds

# OpenRouter Configuration
openrouter:
  enabled: ${OPENROUTER_ENABLED:true}
  api-key: ${OPENROUTER_API_KEY:}
  model: ${OPENROUTER_MODEL:openai/gpt-4o}
  use-only: ${USE_OPENROUTER_ONLY:true}

# Menu Processing Configuration
menu:
  sodexo:
    api-url: https://api.sodexo.com/menu
    api-key: ${SODEXO_API_KEY:}
    cache-ttl: 3600 # 1 hour
    rate-limit:
      requests-per-minute: 60
      burst-capacity: 20
  lucene:
    index-path: ./lucene-index
    analyzer: standard

# Portion Analysis Configuration
portion:
  plate-detection:
    min-radius: 50
    max-radius: 200
    hough-threshold: 50
  density-database:
    default-density: 1.0 # g/cm³
    food-densities:
      rice: 0.8
      pasta: 0.6
      bread: 0.3
      meat: 1.1
      vegetables: 0.9

# Actuator Configuration - Secured in production
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  info:
    env:
      enabled: false

# Swagger/OpenAPI Configuration - DISABLED in production by default
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}

# Logging - Production optimized
logging:
  level:
    root: INFO
    com.nutrition: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.apache.lucene: WARN
    com.microsoft.onnxruntime: WARN
    org.flywaydb: INFO
    org.springframework.boot: INFO
    # Disable multipart request logging to prevent base64 image data in logs
    org.springframework.web.multipart: WARN
    org.apache.commons.fileupload: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/nutrition-app.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

