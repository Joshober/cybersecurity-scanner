spring:
  application:
    name: nutrition-app-backend
  
  datasource:
    # Railway provides DATABASE_URL in format: postgresql://user:password@host:port/dbname
    # RailwayConfig.java automatically maps Railway env vars (PGHOST, PGUSER, PGPASSWORD, etc.)
    # to Spring properties. This YAML uses env vars directly as fallback.
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://postgres:5432/nutrition_db}}
    driver-class-name: org.postgresql.Driver
    # Railway provides PGUSER, PGPASSWORD, PGDATABASE automatically
    # Use SPRING_DATASOURCE_* if set, otherwise use Railway PG* vars directly
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:nutrition_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD}}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:30}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      connection-timeout: 60000
      initialization-fail-timeout: -1
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Use 'none' to prevent Hibernate from validating schema
      # Flyway handles all schema changes via migrations
      # This prevents startup failures when schema doesn't match entities yet
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        jdbc.batch_versioned_data: true
  
  # Redis Configuration
  # Railway provides REDIS_URL if Redis service is added
  # If Redis is not available, cache will fall back to simple (in-memory)
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:${REDIS_HOST:}}
      port: ${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  
  # Cache Configuration
  # Use Redis if REDIS_URL is set, otherwise use simple in-memory cache
  # This prevents startup failures when Redis is not available
  cache:
    type: ${CACHE_TYPE:simple}
    redis:
      time-to-live: 600000 # 10 minutes (only used if cache.type=redis)
  
  # H2 Console - DISABLED in production
  h2:
    console:
      enabled: false
  
  # Flyway Configuration
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    # Don't fail startup if database is not available
    # Migrations will run when database becomes available
    fail-on-missing-locations: false
    # Allow app to start even if migrations fail (will retry on next connection)
    out-of-order: false
  
  # Security - No default credentials in production
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:}
      password: ${SPRING_SECURITY_USER_PASSWORD:}

server:
  port: ${PORT:8080}
  error:
    include-message: never

# Auth0 Configuration
auth0:
  enabled: ${AUTH0_ENABLED:false}
  domain: ${AUTH0_DOMAIN:}
  client-id: ${AUTH0_CLIENT_ID:}
  client-secret: ${AUTH0_CLIENT_SECRET:}
  audience: ${AUTH0_AUDIENCE:}
  issuer: ${AUTH0_ISSUER:${auth0.domain}}

# JWT Configuration (fallback if Auth0 not enabled)
# IMPORTANT: JWT_SECRET must be set as environment variable in Railway
# Generate a secure random string (minimum 32 characters)
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

# CORS Configuration
# IMPORTANT: Set CORS_ALLOWED_ORIGINS environment variable in Railway
# Example: https://meal.up.railway.app,http://localhost:3000
# Multiple origins should be comma-separated
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://meal.up.railway.app,http://localhost:3000}
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true

# ML/AI Configuration
# Mode: "local" uses local ONNX model first, then falls back to OpenRouter if enabled
# Mode: "openrouter-only" uses only OpenRouter API (no local model)
ml:
  mode: ${ML_MODE:local}
  onnx:
    models-path: ${ML_MODELS_PATH:/app/models/}
    food-classification-model: ${ONNX_MODEL_NAME:food_classifier.onnx}
    auto-download: ${ML_AUTO_DOWNLOAD:true}
    model-download-url: ${ML_MODEL_DOWNLOAD_URL:}
  inference:
    batch-size: 1
    timeout: 30000

# OpenRouter Configuration
# Used as fallback when local model is unavailable or fails
openrouter:
  enabled: ${OPENROUTER_ENABLED:true}
  api-key: ${OPENROUTER_API_KEY:}
  model: ${OPENROUTER_MODEL:openai/gpt-4o}
  # If use-only=true, only OpenRouter will be used (no local model fallback)
  use-only: ${USE_OPENROUTER_ONLY:false}

# Menu Processing Configuration
menu:
  sodexo:
    api-url: https://api.sodexo.com/menu
    api-key: ${SODEXO_API_KEY:demo-key}
    cache-ttl: 3600
  lucene:
    index-path: ./lucene-index
    analyzer: standard

# Portion Analysis Configuration
portion:
  plate-detection:
    min-radius: 50
    max-radius: 200
    hough-threshold: 50
  density-database:
    default-density: 1.0
    food-densities:
      rice: 0.8
      pasta: 0.6
      bread: 0.3
      meat: 1.1
      vegetables: 0.9
  segmentation:
    min-area: 500
    max-foods: 10
    color-threshold: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}

# Logging Configuration - Aggressively reduced to prevent Railway rate limits (500 logs/sec)
logging:
  level:
    root: WARN
    # Application logs - only WARN and ERROR to reduce volume
    com.nutrition: WARN
    # Critical services - keep at INFO for important events only
    com.nutrition.controller: INFO
    com.nutrition.security: INFO
    # ML services - reduce to WARN (very verbose)
    com.nutrition.service.SimpleMlInferenceService: WARN
    com.nutrition.service.OnnxFoodRecognitionService: WARN
    com.nutrition.service.FoodSegmentationService: WARN
    com.nutrition.service.ModelDownloaderService: WARN
    com.nutrition.service.OpenRouterService: WARN
    # Framework libraries - all WARN
    org.springframework: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.springframework.boot: WARN
    org.springframework.context: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
    # Third-party libraries - all WARN
    org.apache.lucene: WARN
    com.microsoft.onnxruntime: WARN
    org.flywaydb: WARN
    org.apache.tomcat: WARN
    org.apache.catalina: WARN
    org.apache.coyote: WARN
    # HTTP clients - reduce noise
    org.springframework.web.client: WARN
    org.springframework.web.reactive: WARN
    reactor.netty: WARN
    io.netty: WARN
    okhttp3: WARN
    # Database connection pools
    com.zaxxer.hikari: WARN
    # Disable multipart request logging to prevent base64 image data in logs
    org.springframework.web.multipart: WARN
    org.apache.commons.fileupload: WARN
  pattern:
    # Minimal format to reduce log size
    console: "%d{HH:mm:ss} %-5level %logger{20} - %msg%n"
  file:
    enabled: false

