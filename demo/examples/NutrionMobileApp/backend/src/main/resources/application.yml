spring:
  application:
    name: nutrition-app-backend
  
  datasource:
    url: jdbc:h2:mem:nutrition_db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  
  # H2 for development/testing
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Cache Configuration
  cache:
    type: simple
  
  security:
    user:
      name: admin
      password: admin

server:
  port: 8080

# Auth0 Configuration
auth0:
  domain: ${AUTH0_DOMAIN:}
  client-id: ${AUTH0_CLIENT_ID:}
  client-secret: ${AUTH0_CLIENT_SECRET:}
  audience: ${AUTH0_AUDIENCE:}
  issuer: ${AUTH0_ISSUER:${auth0.domain}}
  enabled: ${AUTH0_ENABLED:false}

# JWT Configuration (fallback if Auth0 not enabled)
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds

# CORS Configuration
cors:
  allowed-origins: "http://localhost:3000,http://localhost:8080,https://*.ngrok.io,https://*.ngrok-free.app"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  allow-credentials: true

# ML/AI Configuration
ml:
  onnx:
    models-path: classpath:models/
    food-classification-model: ${ONNX_MODEL_NAME:food_classifier.onnx}
    # Alternative model names: food_classifier.onnx, food_classification.onnx
    # Auto-download model if it doesn't exist
    auto-download: ${ML_AUTO_DOWNLOAD:true}
    # Custom model download URL (optional, uses default if not specified)
    # For Food-101 model: Set this to your hosted Food-101 ONNX model URL
    # See FOOD101_QUICK_START.md for setup instructions
    model-download-url: ${ML_MODEL_DOWNLOAD_URL:}
  inference:
    batch-size: 1
    timeout: 30000 # 30 seconds
  # Mode: "openrouter-only" uses only OpenRouter, "local" uses local model first
  mode: ${ML_MODE:local} # Options: "openrouter-only", "local"

# OpenRouter Configuration (optional - for food recognition via API)
openrouter:
  enabled: ${OPENROUTER_ENABLED:false}
  api-key: ${OPENROUTER_API_KEY:}
  model: ${OPENROUTER_MODEL:openai/gpt-4o}
  # If USE_OPENROUTER_ONLY=true, only OpenRouter will be used (no local model fallback)
  use-only: ${USE_OPENROUTER_ONLY:false}

# Menu Processing Configuration
menu:
  sodexo:
    api-url: https://api.sodexo.com/menu
    api-key: ${SODEXO_API_KEY:demo-key}
    cache-ttl: 3600 # 1 hour
    rate-limit:
      requests-per-minute: 10 # Reduced for development
      burst-capacity: 5
  lucene:
    index-path: ./lucene-index
    analyzer: standard

# Portion Analysis Configuration
portion:
  plate-detection:
    min-radius: 50
    max-radius: 200
    hough-threshold: 50
  density-database:
    default-density: 1.0 # g/cm³
    food-densities:
      rice: 0.8
      pasta: 0.6
      bread: 0.3
      meat: 1.1
      vegetables: 0.9

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Flyway Configuration
flyway:
  enabled: ${FLYWAY_ENABLED:true}
  locations: classpath:db/migration
  baseline-on-migrate: true

# Logging
logging:
  level:
    com.nutrition: DEBUG
    org.springframework.security: DEBUG
    org.apache.lucene: WARN
    com.microsoft.onnxruntime: INFO
    org.flywaydb: INFO
