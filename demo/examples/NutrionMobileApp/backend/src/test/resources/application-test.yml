spring:
  profiles:
    active: test
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
  
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# Test-specific configurations
test:
  data:
    cleanup: true
    fixtures:
      enabled: true
  
  external:
    apis:
      mock: true
      timeout: 5000

# Disable external API calls in tests
menu:
  sodexo:
    api-url: http://localhost:8080/api/menu/mock-sodexo
    api-key: test-key
    cache-ttl: 60
    rate-limit:
      requests-per-minute: 1000
      burst-capacity: 500

ml:
  model-service-url: http://localhost:8080/api/mock-ml

# Security configuration for tests
security:
  jwt:
    secret: test-secret-key-for-jwt-token-generation-in-tests-only
    expiration: 3600000

# Logging for tests
logging:
  level:
    com.nutrition: DEBUG
    org.springframework.security: DEBUG
    org.springframework.test: DEBUG
    org.testcontainers: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
