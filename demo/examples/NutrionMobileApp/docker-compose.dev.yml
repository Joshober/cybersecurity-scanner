# Development Docker Compose - No models, uses mock or OpenRouter
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    environment:
      # Disable local model auto-download for faster startup
      ML_AUTO_DOWNLOAD: "false"
      # Use OpenRouter if configured, otherwise mock
      ML_MODE: "openrouter-only"
      OPENROUTER_ENABLED: ${OPENROUTER_ENABLED:-false}
      # Development: Use H2 database (no PostgreSQL needed)
      SPRING_DATASOURCE_URL: jdbc:h2:mem:nutrition_db
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_PROFILES_ACTIVE: docker
    # No model volumes needed
    volumes:
      - ./backend/logs:/app/logs
    # Don't depend on postgres/redis in dev mode
    depends_on: []

