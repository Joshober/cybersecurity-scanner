# Docker Compose configuration without local models
# Uses OpenRouter API or mock implementation for food recognition
# Usage: docker-compose -f docker-compose.yml -f docker-compose.no-models.yml up

services:
  backend:
    environment:
      # Disable local model auto-download
      ML_AUTO_DOWNLOAD: "false"
      ML_MODE: "openrouter-only"
      # Use OpenRouter for food recognition (or mock if not configured)
      OPENROUTER_ENABLED: ${OPENROUTER_ENABLED:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o}
      USE_OPENROUTER_ONLY: ${USE_OPENROUTER_ONLY:-false}
      # No model file needed
      ONNX_MODEL_NAME: ""
      ML_MODEL_DOWNLOAD_URL: ""
    # Override volumes - remove model volume
    volumes:
      - ./backend/logs:/app/logs

