services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nutrition-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrition_db}
      POSTGRES_USER: ${POSTGRES_USER:-nutrition_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutrition_user} -d ${POSTGRES_DB:-nutrition_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nutrition-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Model Service (Python FastAPI for ML inference)
  model-service:
    build:
      context: ./model-service
      dockerfile: Dockerfile
    container_name: nutrition-model-service
    ports:
      - "8000:8000"
    volumes:
      - ./model-service/models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrition-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nutrition_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nutrition_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nutrition123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      # ML Configuration - can be overridden
      ML_AUTO_DOWNLOAD: ${ML_AUTO_DOWNLOAD:-true}
      ML_MODE: ${ML_MODE:-openrouter-only}
      ML_MODEL_DOWNLOAD_URL: ${ML_MODEL_DOWNLOAD_URL:-}
      ML_MODELS_PATH: ${ML_MODELS_PATH:-/app/models/}
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL:-http://model-service:8000}
      OPENROUTER_ENABLED: ${OPENROUTER_ENABLED:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o}
      USE_OPENROUTER_ONLY: ${USE_OPENROUTER_ONLY:-false}
      # Auth0 (optional)
      AUTH0_ENABLED: ${AUTH0_ENABLED:-false}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-NutritionAppSuperSecretJWTKey2024Minimum32CharsLongForHS256Algorithm}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # Swagger Configuration
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      model-service:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
      # Models directory (optional - for local models)
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Frontend (Flutter Web)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080/api}
        AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
        AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
        AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
    container_name: nutrition-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

volumes:
  postgres_data:
  redis_data:
