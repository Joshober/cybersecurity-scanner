name: nutrition_app
description: A comprehensive nutrition tracking application with Flutter frontend and Java Spring Boot backend.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  
  # Charts and Graphs
  fl_chart: ^0.66.0
  
  # Date and Time
  intl: ^0.19.0
  
  # Form Validation
  form_validator: ^2.1.1
  
  # Loading Indicators
  flutter_spinkit: ^5.2.0
  
  # Icons
  font_awesome_flutter: ^10.6.0
  
  # Platform Detection
  universal_platform: ^1.0.0
  
  # Responsive Design
  responsive_framework: ^1.1.1
  
  # Camera and Image Processing (Mobile only)
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  # tflite_flutter: ^0.9.0
  # tflite_flutter_helper: ^0.2.1
  
  # Image Processing
  image: ^3.3.0
  
  # Web-specific dependencies
  url_launcher: ^6.2.2
  # file_picker: ^6.1.1  # Temporarily disabled due to compatibility issues
  
  # Auth0 Authentication
  auth0_flutter: ^1.14.0
  
  # Cryptography for PKCE
  crypto: ^3.0.3
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # PWA Support
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Testing Dependencies
  mockito: ^5.4.4
  build_runner: ^2.4.7
  integration_test:
    sdk: flutter
  test: ^1.24.6
  http_mock_adapter: ^0.6.1
  fake_async: ^1.3.1
  clock: ^1.1.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
  
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
  #       - asset: fonts/Roboto-Bold.ttf
  #         weight: 700
