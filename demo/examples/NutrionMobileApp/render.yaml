services:
  # Backend Service
  - type: web
    name: nutrition-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/nutrition-app-backend-*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false  # Set manually from PostgreSQL service
      - key: SPRING_DATA_REDIS_HOST
        sync: false  # Set manually from Redis service
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to frontend URL
      - key: SWAGGER_ENABLED
        value: false
      - key: AUTH0_ENABLED
        value: true
      - key: ML_MODE
        value: openrouter-only
      - key: OPENROUTER_ENABLED
        value: true

  # Frontend Service
  - type: web
    name: nutrition-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    buildCommand: |
      flutter pub get && \
      flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL
    envVars:
      - key: API_BASE_URL
        sync: false  # Set to backend URL: https://nutrition-backend.onrender.com/api

databases:
  - name: nutrition-postgres
    plan: free
    databaseName: nutrition_db
    user: nutrition_user

