# Universal architecture settings — global defaults (merge with settings.<env>.yaml)
# AI tools and humans: fill facts only. Run: npx secure-arch check
schemaVersion: "1"
project:
  name: "change-me"

environments:
  default:
    database:
      exposure: unknown # internal | vpc | internet | unknown
      publiclyReachable: false
      allowedClientTypes: []
    authentication:
      enabled: true
      mechanisms: [unknown] # none | session | jwt | oauth | api_key | mtls | other | unknown
    authorization:
      model: unknown # rbac | abac | none | unknown
      enforcedEverywhere: true
    secrets:
      storage: unknown # vault | kms | env_vars | file | repo | unknown
      embeddedInRepo: false
      embeddedInImages: false
    cors:
      allowCredentials: false
      origins: []
    network:
      ingressPublic: true
      defaultDenyBetweenServices: false
    storage:
      publicBuckets: false
      notes: ""
    deployment:
      target: unknown
      debugEnabledInProduction: false
    envIsolation:
      separateAccountsOrProjects: false
      sharedDatabaseAcrossEnvs: false
    trustBoundaries:
      frontendMayReachDatabaseDirectly: false
      publicApiReachesInternalAdmin: false
    serviceCommunication:
      allowlistEnforced: false
      overlyPermissiveIam: false
